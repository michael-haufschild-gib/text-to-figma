version: 2
updates:
  # Root workspace (devDependencies: eslint, vitest, prettier, husky, etc.)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'root'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  # MCP Server dependencies
  - package-ecosystem: 'npm'
    directory: '/mcp-server'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'mcp-server'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  # WebSocket Server dependencies
  - package-ecosystem: 'npm'
    directory: '/websocket-server'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'websocket-server'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  # Figma Plugin dependencies
  - package-ecosystem: 'npm'
    directory: '/figma-plugin'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'figma-plugin'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  # Tests dependencies
  - package-ecosystem: 'npm'
    directory: '/tests'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'tests'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'
