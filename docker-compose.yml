services:
  # WebSocket Bridge Server
  websocket-bridge:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      - PORT=8080
      - REQUEST_TIMEOUT=30000
      - MAX_MESSAGE_SIZE=10485760
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const net = require('net'); const s = new net.Socket(); s.connect(8080, '127.0.0.1', () => { s.destroy(); process.exit(0); }); s.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 3000);"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - text-to-figma

  # MCP Server
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    depends_on:
      websocket-bridge:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - FIGMA_WS_URL=ws://websocket-bridge:8080
      - LOG_LEVEL=info
      - HEALTH_CHECK_PORT=8081
      - HEALTH_CHECK_ENABLED=true
      - ENABLE_METRICS=true
      - ENABLE_ERROR_TRACKING=true
    ports:
      - '8081:8081' # Health check endpoint
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:8081/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - text-to-figma

networks:
  text-to-figma:
    driver: bridge
